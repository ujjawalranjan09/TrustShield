replicaCount: 2

image:
  repository: ghcr.io/trustshield/api
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: true
  className: alb
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
  hosts:
    - host: api.trustshield.example.com
      paths:
        - path: /
          pathType: Prefix

resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

env:
  DATABASE_URL: ""
  REDIS_URL: ""
  NEO4J_URI: ""
  event_backend: redis

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

pgbouncer:
  enabled: true
  image:
    repository: edoburu/pgbouncer
    tag: "1.21.0"
  port: 6432
  volumeMount: /etc/pgbouncer
  sidecar:
    name: pgbouncer
    image: edoburu/pgbouncer:1.21.0
    imagePullPolicy: IfNotPresent
    ports:
      - containerPort: 6432
        name: pgbouncer
        protocol: TCP
    volumeMounts:
      - name: pgbouncer-config
        mountPath: /etc/pgbouncer
        readOnly: true
    resources:
      limits:
        cpu: 250m
        memory: 128Mi
      requests:
        cpu: 100m
        memory: 64Mi
  volumes:
    - name: pgbouncer-config
      configMap:
        name: pgbouncer-ini

database:
  sslMode: require

redis:
  tls: true
