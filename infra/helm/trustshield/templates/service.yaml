apiVersion: v1
kind: Service
metadata:
  name: {{ include "trustshield.fullname" . }}
  labels:
    {{- include "trustshield.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
  selector:
    {{- include "trustshield.selectorLabels" . | nindent 4 }}
