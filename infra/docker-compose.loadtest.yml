version: '3.8'

services:
  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:changeme@postgres:5432/trustshield
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis

  postgres:
    image: ankane/pgvector:v0.5.1
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=changeme
      - POSTGRES_DB=trustshield
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7

  locust-master:
    image: locustio/locust
    command: -f /mnt/locust/test_analyze.py --master --host=http://api:8000
    volumes:
      - ../backend/tests/load:/mnt/locust
    ports:
      - "8089:8089"

  locust-worker:
    image: locustio/locust
    command: -f /mnt/locust/test_analyze.py --worker --master-host=locust-master
    volumes:
      - ../backend/tests/load:/mnt/locust
    depends_on:
      - locust-master
    deploy:
      replicas: 3

volumes:
  pgdata:
