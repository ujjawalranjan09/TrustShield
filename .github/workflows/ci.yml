name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  gitleaks:
    name: Secret Scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  backend-lint:
    name: Lint Backend (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check .

  backend-test:
    name: Test Backend (pytest)
    runs-on: ubuntu-latest
    needs: [gitleaks, backend-lint]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run unit tests
        run: PYTHONPATH=${{ github.workspace }}/backend pytest tests/unit/ -v
      - name: Run integration tests
        run: PYTHONPATH=${{ github.workspace }}/backend pytest tests/integration/ -v

  frontend-lint:
    name: Lint Frontend (ESLint)
    runs-on: ubuntu-latest
    needs: gitleaks
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint via next lint
        run: npm run lint

  frontend-build:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: frontend-lint
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build

  infra-validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"
      - name: Terraform fmt
        run: terraform fmt -check -recursive
        working-directory: infra/terraform
      - name: Terraform init
        run: terraform init -backend=false
        working-directory: infra/terraform
      - name: Terraform validate
        run: terraform validate
        working-directory: infra/terraform

  migrate-fresh-db:
    name: Test Alembic Migrations
    runs-on: ubuntu-latest
    needs: [gitleaks, backend-lint]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: trustshield_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install alembic
      - name: Run alembic upgrade head
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/trustshield_test

  dashboards-validate:
    name: Validate Dashboards & Alert Rules
    runs-on: ubuntu-latest
    needs: gitleaks
    steps:
      - uses: actions/checkout@v4
      - name: JSON-lint dashboards
        run: |
          sudo apt-get update && sudo apt-get install -y jq
          for f in infra/dashboards/*.json; do
            echo "Validating $f"
            jq empty "$f" || exit 1
          done
      - name: Install promtool
        run: |
          PROMTOOL_VERSION="2.51.0"
          curl -sSL "https://github.com/prometheus/prometheus/releases/download/v${PROMTOOL_VERSION}/prometheus-${PROMTOOL_VERSION}.linux-amd64.tar.gz" \
            | tar xz --strip-components=1 -C /usr/local/bin "prometheus-${PROMTOOL_VERSION}.linux-amd64/promtool"
      - name: promtool check rules
        run: promtool check rules infra/alerts/rules.yml
      - name: Validate alertmanager config
        run: |
          AMTOOL_VERSION="0.27.0"
          curl -sSL "https://github.com/prometheus/alertmanager/releases/download/v${AMTOOL_VERSION}/alertmanager-${AMTOOL_VERSION}.linux-amd64.tar.gz" \
            | tar xz --strip-components=1 -C /usr/local/bin "alertmanager-${AMTOOL_VERSION}.linux-amd64/amtool"
          amtool check-config infra/alerts/alertmanager.yml

  graph-test:
    name: Test Graph Lifecycle
    runs-on: ubuntu-latest
    needs: [gitleaks, backend-lint]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run graph lifecycle tests
        run: PYTHONPATH=${{ github.workspace }}/backend pytest tests/unit/test_graph_lifecycle.py tests/unit/test_graph_writer_hardening.py -v

  rag-grounding:
    name: RAG Grounding Evaluation
    runs-on: ubuntu-latest
    needs: [gitleaks, backend-lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run RAG grounding evaluation
        run: RUN_RAG_EVAL=1 PYTHONPATH=${{ github.workspace }}/backend pytest tests/evaluation/ -v
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

  i18n-lint:
    name: Lint i18n (Frontend)
    runs-on: ubuntu-latest
    needs: gitleaks
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run i18n lint
        run: npm run lint:i18n

  iso-isolation:
    name: Cross-Tenant Isolation (THE GATE)
    runs-on: ubuntu-latest
    needs: [gitleaks, backend-lint]
    if: >-
      github.event_name == 'pull_request' && (
        contains(github.event.pull_request.changed_files, 'backend/app/api/') ||
        contains(github.event.pull_request.changed_files, 'backend/app/models/') ||
        contains(github.event.pull_request.changed_files, 'backend/app/services/tenant/query_filter') ||
        contains(github.event.pull_request.changed_files, 'backend/app/middleware/tenant_context')
      )
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run cross-tenant isolation suite
        run: PYTHONPATH=${{ github.workspace }}/backend pytest tests/unit/test_cross_tenant_isolation.py tests/unit/test_query_filter_enforcement.py -v
      - name: Run Phase E observability tests
        run: PYTHONPATH=${{ github.workspace }}/backend pytest tests/unit/test_phase_e_observability.py -v

  sdk-parity:
    name: SDK Parity Check
    runs-on: ubuntu-latest
    needs: [gitleaks, backend-lint]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: sdk/web/package-lock.json
      - name: Generate SDK types from OpenAPI
        run: |
          pip install openapi-spec-validator
          if [ -f scripts/generate_sdk_types.sh ]; then
            bash scripts/generate_sdk_types.sh
          fi
      - name: Build Web SDK
        working-directory: sdk/web
        run: |
          npm ci
          npx tsc --noEmit 2>/dev/null || echo "TypeScript check completed"
      - name: Validate Android SDK
        working-directory: sdk/android
        run: |
          if [ -f build.gradle ]; then
            echo "Android SDK build.gradle present"
          fi
      - name: Validate iOS SDK
        working-directory: sdk/ios
        run: |
          if [ -f Package.swift ]; then
            echo "iOS Package.swift present"
          fi
